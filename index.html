    font-size:14px;
}

/* LANGUAGE BUTTONS */
.lang-buttons{
    text-align:center;
    margin:20px 0;
}

.lang-buttons button{
    padding:8px 15px;
    margin:5px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    background:#eee;
    font-weight:600;
}

.lang-buttons button.active{
    background:#5e3c99;
    color:#fff;
}

/* COUNTDOWN */
.countdown{
    text-align:center;
    background:#f3e8ff;
    padding:20px;
    border-radius:15px;
    margin-bottom:30px;
}

#timer{
    font-size:22px;
    font-weight:600;
}

/* CARDS */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:#fafafa;
    padding:20px;
    border-radius:15px;
    border-left:6px solid #5e3c99;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.event{
    font-weight:700;
    margin-bottom:10px;
    color:#5e3c99;
}

.time{
    font-weight:600;
    margin-top:8px;
}

@media(max-width:600px){
    .container{
        padding:20px;
    }
}
</style>
</head>

    <div class="lang-buttons">
        <button onclick="setLang('cn', this)" class="active">中文</button>
	<button onclick="setLang('en', this)">English</button>
	<button onclick="setLang('bm', this)">BM</button>
    </div>

    <!-- COUNTDOWN -->
    <div class="countdown">
        <div id="countdown-title">Countdown to Easter Sunday</div>
        <div id="timer"></div>
    </div>

    <!-- EVENTS -->
    <div class="cards" id="events"></div>

</div>

<script>
const eventsData = {
    cn: [ 
        ["棕枝主日","早上7:30 "],
        ["圣星期四","晚上8:00 "],
        ["耶稣受难日","中午12:00 "],
        ["复活节主日","早上8:00 "]
    ], //
    en: [
        ["Palm Sunday","9:30 AM"],
        ["Maundy Thursday","8:00 PM"],
        ["Good Friday","1:00 PM"],
        ["Easter Sunday","10:00 AM"]
    ],
    bm: [
        ["Minggu Palma","11:30 AM"],
        ["Khamis Putih","8:00 PM"],
        ["Jumaat Agung","2:00 PM"],
        ["Hari Paskah","5:00 AM"]
    ],
      
};

function setLang(lang, el){
    document.querySelectorAll(".lang-buttons button")
        .forEach(btn => btn.classList.remove("active"));

    if(el){
        el.classList.add("active");
    }

    const container = document.getElementById("events");
    container.innerHTML = "";

    eventsData[lang].forEach(item=>{
        container.innerHTML += `
            <div class="card">
                <div class="event">${item[0]}</div>
                <div class="time">${item[1]}</div>
            </div>
        `;
    });
}
setLang("en", document.querySelector(".lang-buttons button"));

/* COUNTDOWN */
const easterDate = new Date("April 5, 2026 00:00:00").getTime();

const timer = setInterval(function(){
    const now = new Date().getTime();
    const distance = easterDate - now;

    if(distance < 0){
        clearInterval(timer);
        document.getElementById("timer").innerHTML = "Happy Easter ✝️";
        return;
    }

    var days = Math.floor(distance/(1000*60*60*24));
    var hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
    var minutes = Math.floor((distance%(1000*60*60))/(1000*60));
    var seconds = Math.floor((distance%(1000*60))/1000);

    document.getElementById("timer").innerHTML = 
        days + "d " +
        hours + "h " +
        minutes + "m " +
        seconds + "s";
},1000);
</script>
